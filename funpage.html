    <div class="container mt-5">
        <div class="card p-4 shadow">
            <h1 class="text-center">Fun page</h1>
            <p class="text-center">Choose the correct muscle group for eac exercise </p>
            <div class="mb-3">
                <label class="from-label">1. push-up</label>
                <select id="q1" class="from-select">
                    <option value="">Choose</option>
                    <option value="Chest">Chest</option>
                    <option value="Legs">Legs</option>
                    <option value="Core">Core</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="from-label">2. squat</label>
                <select id="q2" class="from-select">
                    <option value="">Choose</option>
                    <option value="Chest">Chest</option>
                    <option value="Legs">Legs</option>
                    <option value="Core">Core</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="from-label">3. Plank</label>
                <select id="q3" class="from-select">
                    <option value="">Choose</option>
                    <option value="Chest">Chest</option>
                    <option value="Legs">Legs</option>
                    <option value="Core">Core</option>
                </select>
            </div>

            <button class="btn btn-primary me-2" onclick="checkAnswers()">Check Answers</button>
            <button class="btn btn-secondary" onclick="resetGame()">Reset</button>

            <p id="result" class="mt-3 fw-bold text-center"></p>
        </div>
    </div>

    <script>
        /*  this function checks the selected answer 
        reads the value of each select element 
        show the result score  */ 
        function checkAnswers() {
            var score = 0;

            var answers1 = document.getElementById("q1").value;
            var answers2 = document.getElementById("q2").value;
            var answers3 = document.getElementById("q3").value;

            if (answers1 == "Chest") {
                score = score + 1;
            }
            
            if (answers2 == "Legs") {
                score = score + 1;
            }
            if(answers3 == "Core") {
                score = score + 1;
            }

            document.getElementById("result").innerHTML = "Yor score is " + score + "out of 3";

 
        }
        /*her in this fuction reset the game 
        and clear all the answer 
        also remove the result value */
        function resetGame() {
            document.getElementById("q1").value = "";
            document.getElementById("q2").value = "";
            document.getElementById("q3").value = "";
            document.getElementById("result").innerHTML = "";
        }


    </script>
