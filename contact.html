<div class="text-center bg-light flex-fill p-4">
    <br><br>
    <h2>Contact Us</h2>

    <form action="https://httpbin.org/get" class="was-validated">

        <input type="text" name="name" placeholder="Your Name" class="form-control" required>
        <div class="invalid-feedback">Please enter your name.</div><br><br>

        <input type="email" name="email" placeholder="Your Email" class="form-control" required>
        <div class="invalid-feedback">Please enter a valid email address.</div><br><br>

        <input type="number" name="age" placeholder="Your Age" class="form-control" required><br><br>
        
        <label>Select Your Goal:</label><br>
        <select name="goal" class="form-control" required>
            <option></option>
            <option>Lose Weight</option>
            <option>Build Muscle</option>
        </select><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male" class="form-check-input" required>
        <label class="form-check-label">Male</label>
        <input type="radio" name="gender" value="Female" class="form-check-input">
        <label class="form-check-label">Female</label><br><br>

        <textarea name="message" placeholder="Any feedback to improve our services or questions? " class="form-control"></textarea><br><br>

        <input type="submit" value="Send" class="btn btn-primary">

    </form>
</div>

<footer class="bg-primary text-white text-center p-3">
