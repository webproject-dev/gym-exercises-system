
<!DOCTYPE html>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</head>


<body onload="showPlans()" class="d-flex flex-column min-vh-100">

<div class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="index.html">Gym Exercises System</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="exercises.html">Exercises</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="plans.html">Workout Plans</a>

                <li class="nav-item">

                <li class="nav-item">

                </li>
                <li class="nav-item">

                <li class="nav-item">
                    <a class="nav-link active" href="calculator.html">Calculator</a>
                </li>
            </ul>
        </div>
    </div>
</div>


<div class="text-center bg-light flex-fill p-4">
    <br><br>
    <h2 class="fw-bold">Weekly Workout Plan</h2>

    <table id="planTable" class="table table-striped" cellspacing="5">
        <thead>
            <tr>
                <th colspan="3" class="bg-primary text-white">Workout Schedule</th>
            </tr>
            <tr>
                <th class="bg-primary text-white">Day</th>
                <th class="bg-primary text-white">Exercise</th>
                <th class="bg-primary text-white">Reps</th>  
            </tr>
        </thead>

        <tbody id="planBody">
        </tbody>
    </table>

<h3 class="mt-4">Add New Plan</h3>

<input type="text" id="day" class="form-control mb-2" placeholder="Day">
<input type="text" id="pexercise" class="form-control mb-2" placeholder="Exercise">
<input type="text" id="reps" class="form-control mb-2" placeholder="Reps">

<button class="btn btn-primary" onclick="addPlan()">Add Plan</button>
<br><br>
<h3 class="mt-4">Search Plan</h3>

<input type="text" id="searchPlan" class="form-control mb-2" placeholder="Enter day">
<button class="btn btn-success" onclick="findPlan()">Search</button>

<p id="planResult"></p>

</div>

<footer class="bg-primary text-white text-center p-3">
    <p>© 2026 Gym Exercises System</p>
</footer>

</body>
